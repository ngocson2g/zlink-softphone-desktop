name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Checkout Submodules (Workaround for GitLab block)
        shell: bash
        run: |
          # GitLab is blocking Azure/GitHub Actions IPs. 
          # We force Git to pull core linphone-sdk repos from GitHub mirrors.
          git config --global url."https://github.com/BelledonneCommunications/".insteadOf "https://gitlab.linphone.org/BC/public/"
          
          # Set short timeout so git doesn't hang for 21 seconds per missing repo
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 5
          
          # Clone the main SDK which exists on GitHub
          git submodule update --init external/linphone-sdk
          
          # Attempt to clone recursive submodules. 
          # Libraries like aom, dav1d, codec2 don't exist on GitHub and will fail. 
          # We ignore the error and let CMake handle the missing optional libraries.
          git submodule update --init --recursive || echo "Some optional external submodules failed to clone. Continuing with core libraries..."

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0' # Linphone requires >= 6.8.0
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtnetworkauth'

      - name: Install Dependencies
        run: |
          choco install nasm yasm ninja doxygen.install --installargs 'ADD_CMAKE_TO_PATH=System' -y
          pip install pystache six
          echo "C:\Program Files\doxygen\bin" >> $env:GITHUB_PATH

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # Configure CMake with MSVC, targeting x64.
          # Packaging enabled to generate the NSIS executable installer.
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DENABLE_APP_PACKAGING=YES `
            -DENABLE_VIDEO=ON `
            -DENABLE_NON_FREE_CODECS=ON `
            -DENABLE_OPENH264=ON `
            -DENABLE_G729=ON `
            -DENABLE_PQCRYPTO=ON `
            -DENABLE_GPL_THIRD_PARTIES=OFF `
            -DENABLE_CRASH_HANDLER=OFF

      - name: Build
        run: |
          cd build
          cmake --build . --parallel 4 --config RelWithDebInfo

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zlink-Windows-Installer
          # The packaging process will put the installer in the OUTPUT/Packages folder
          path: build/OUTPUT/Packages/*.exe
